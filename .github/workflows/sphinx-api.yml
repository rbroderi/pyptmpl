name: Sphinx API Docs
"on":
  pull_request:
    paths:
      - src/**
      - docs_sphinx/**
      - justfile
      - pyproject.toml
      - uv.lock
      - .github/workflows/sphinx-api.yml
  push:
    branches: [main]
    paths:
      - src/**
      - docs_sphinx/**
      - justfile
      - pyproject.toml
      - uv.lock
      - .github/workflows/sphinx-api.yml
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
      - name: Build automatic Sphinx API docs
        run: |
          uv sync --extra docs
          rm -rf docs_sphinx/apidoc
          rm -rf docs_sphinx/generated
          package_name=$(uv run python - <<'PY'
          import re
          from pathlib import Path

          content = Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'(?m)^name\s*=\s*"([^\"]+)"', content)
          if not match:
              raise SystemExit("project.name not found in pyproject.toml")
          print(match.group(1).replace("-", "_"))
          PY
          )
          SPHINX_APIDOC_OPTIONS=show-inheritance
          uv run sphinx-apidoc -f --remove-old -o docs_sphinx/apidoc "src/${package_name}" "src/${package_name}/tests"
          uv run sphinx-build -b html docs_sphinx docs_sphinx/_build/html
