name: Docs
"on":
  push:
    branches: [main]
    paths:
      - src/**
      - docs/**
      - docs_sphinx/**
      - zensical.toml
      - justfile
      - .github/workflows/docs.yml
      - pyproject.toml
      - uv.lock
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
      - name: Install docs dependencies
        run: uv sync --extra docs --extra dev
      - name: Build API docs with Sphinx
        run: |
          rm -rf docs_sphinx/apidoc
          rm -rf docs_sphinx/generated
          rm -rf docs/api
          package_name=$(uv run python - <<'PY'
          import re
          from pathlib import Path

          content = Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'(?m)^name\s*=\s*"([^\"]+)"', content)
          if not match:
              raise SystemExit("project.name not found in pyproject.toml")
          print(match.group(1).replace("-", "_"))
          PY
          )
          SPHINX_APIDOC_OPTIONS=show-inheritance
          uv run sphinx-apidoc -f --remove-old -o docs_sphinx/apidoc "src/${package_name}" "src/${package_name}/tests"
          find docs_sphinx/apidoc -name '*.rst' -type f -exec sed -i '/^[[:space:]]*:members:$/d;/^[[:space:]]*:undoc-members:$/d' {} +
      - name: Build docs
        run: |
          uv run sphinx-build -b html docs_sphinx docs/api
          uv run zensical build --clean
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
